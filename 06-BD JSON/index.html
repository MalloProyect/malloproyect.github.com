<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gestión de Empleados</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="backdrop"></div>
    <main class="layout">
      <section class="panel header-panel">
        <h1>Base de Datos de Empleados</h1>
        <p>
          Administra nombres, apellidos, correo, contacto, salario y fecha de
          nacimiento en un solo lugar.
        </p>
      </section>

      <section class="panel form-panel">
        <h2 id="formTitle">Agregar empleado</h2>
        <form id="employeeForm" novalidate>
          <div class="field-grid">
            <label>
              Nombre
              <input type="text" id="firstName" name="firstName" required />
            </label>

            <label>
              Apellido
              <input type="text" id="lastName" name="lastName" required />
            </label>

            <label>
              Correo
              <input type="email" id="email" name="email" required />
            </label>

            <label>
              Contacto
              <input
                type="tel"
                id="contactNumber"
                name="contactNumber"
                placeholder="+34 600 000 000"
                required
              />
            </label>

            <label>
              Salario (USD)
              <input
                type="number"
                id="salary"
                name="salary"
                min="0"
                step="0.01"
                required
              />
            </label>

            <label>
              Fecha de nacimiento
              <input type="date" id="birthDate" name="birthDate" required />
            </label>

            <label class="full-width">
              URL de imagen (opcional)
              <input
                type="url"
                id="imageUrl"
                name="imageUrl"
                placeholder="https://..."
              />
            </label>
          </div>

          <div class="form-actions">
            <button id="submitBtn" type="submit" class="btn-primary">Guardar empleado</button>
            <button id="cancelEditBtn" type="button" class="btn-secondary hidden">Cancelar edicion</button>
          </div>
          <p id="formMessage" class="form-message" aria-live="polite"></p>
        </form>
      </section>

      <section class="panel table-panel">
        <div class="table-header">
          <h2>Listado de empleados</h2>
          <span id="employeeCounter" class="counter">0 empleados</span>
        </div>

        <div class="table-wrapper">
          <table>
            <thead>
              <tr>
                <th>Foto</th>
                <th>Nombre completo</th>
                <th>Correo</th>
                <th>Contacto</th>
                <th>Salario</th>
                <th>Fecha de nacimiento</th>
                <th>Acciones</th>
              </tr>
            </thead>
            <tbody id="employeeTableBody"></tbody>
          </table>
        </div>
      </section>
    </main>

    <div id="deleteBanner" class="delete-banner hidden" role="dialog" aria-modal="true" aria-labelledby="deleteBannerTitle">
      <div class="delete-banner-card">
        <h3 id="deleteBannerTitle">Confirmar eliminacion</h3>
        <p id="deleteBannerText"></p>
        <div class="delete-banner-actions">
          <button id="cancelDeleteBtn" type="button" class="btn-secondary">Cancelar</button>
          <button id="confirmDeleteBtn" type="button" class="btn-danger">Eliminar</button>
        </div>
      </div>
    </div>

    <template id="employeeRowTemplate">
      <tr>
        <td>
          <img class="avatar" alt="Foto del empleado" />
        </td>
        <td class="name-col"></td>
        <td class="email-col"></td>
        <td class="phone-col"></td>
        <td class="salary-col"></td>
        <td class="birth-col"></td>
        <td>
          <div class="row-actions">
            <button class="btn-edit" type="button">Editar</button>
            <button class="btn-danger" type="button">Eliminar</button>
          </div>
        </td>
      </tr>
    </template>

    <script src="app.js" defer></script>
  </body>
</html>
