<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contador Interactivo</title>
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <main class="app">
    <h1>Contador</h1>

    <section class="panel contador-panel" aria-live="polite">
      <p class="label">Recuento actual</p>
      <p id="count" class="value">0</p>
    </section>

    <section class="controls">
      <button id="decrement" class="btn btn-decrement" type="button">- Disminuir</button>
      <button id="increment" class="btn btn-increment" type="button">+ Incrementar</button>
    </section>

    <section class="stats" aria-live="polite">
      <div class="panel">
        <p class="label">Clics en incrementar</p>
        <p id="incClicks" class="value small">0</p>
      </div>
      <div class="panel">
        <p class="label">Clics en disminuir</p>
        <p id="decClicks" class="value small">0</p>
      </div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
